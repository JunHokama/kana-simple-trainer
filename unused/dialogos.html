<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Diálogos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

        :root {
            --bg-color: #0f172a; /* Azul meia-noite escuro */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --card-bg: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            text-align: center; 
            width: 100%; 
            max-width: 500px; /* Mais largo para diálogos */
            padding: 20px;
            box-sizing: border-box;
        }

        h2 { 
            font-weight: 300; 
            letter-spacing: 0.2rem; 
            text-transform: uppercase; 
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #f1f5f9;
            opacity: 0.8;
        }

        .filter-container {
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        select option {
            color: var(--text-main);
            background: var(--card-bg);
        }

        .flashcard-wrapper {
            perspective: 1500px;
            width: 100%;
            height: 400px; /* Mais alto para caber os textos */
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 40px 30px;
            box-sizing: border-box;
            overflow-y: auto; /* Permite rolar se o texto for gigante */
        }

        /* Esconde a barra de rolagem mas mantém a funcionalidade */
        .front::-webkit-scrollbar, .back::-webkit-scrollbar { display: none; }
        .front, .back { -ms-overflow-style: none; scrollbar-width: none; }

        .back { 
            transform: rotateY(180deg); 
            background: #ffffff;
        }

        .dialogo-texto { 
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-main);
            text-align: left;
            width: 100%;
            white-space: pre-wrap; /* Mágica para quebras de linha funcionarem */
            margin: 0;
            transition: font-size 0.3s ease;
        }

        .dialogo-texto.medium { font-size: 1.2rem; }
        .dialogo-texto.small { font-size: 1rem; }

        .badge {
            background-color: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.6;
            position: absolute;
            bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
            left: 0;
        }

        .nav-buttons { 
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover { 
            background-color: #2563eb; 
            transform: translateY(-2px);
        }

        .btn-voltar {
            background: transparent;
            color: #f8fafc;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
        }

        .btn-voltar:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Treino de Diálogos</h2>

        <div class="filter-container">
            <select id="aula-select">
                <option value="todos">Todos os Diálogos</option>
                <option value="6">Aula 6 - Restaurante / Izakaya</option>
                <option value="7">Aula 7 - Moradia</option>
            </select>
        </div>
        
        <div class="flashcard-wrapper" onclick="document.getElementById('card').classList.toggle('flipped')">
            <div class="flashcard" id="card">
                <div class="front">
                    <!-- <span class="badge">Romaji</span> -->
                    <div id="txt-romaji" class="dialogo-texto">Carregando...</div>
                    <span class="hint">Toque para ver a tradução</span>
                </div>
                <div class="back">
                    <span class="badge" style="background-color: #10b981;">Português</span>
                    <div id="txt-traducao" class="dialogo-texto">Carregando...</div>
                    <span class="hint">Toque para voltar</span>
                </div>
            </div>
        </div>
        
        <div class="nav-buttons">
            <button class="btn-voltar" onclick="window.history.back()">Voltar</button>
            <button id="next-btn">Próximo</button>
        </div>
    </div>

    <script>
        let todosOsDialogos = []; 
        let dialogosFiltrados = [];
        let indexAtual = 0;

        const cardElement = document.getElementById('card');
        const txtRomaji = document.getElementById('txt-romaji');
        const txtTraducao = document.getElementById('txt-traducao');
        const nextBtn = document.getElementById('next-btn');
        const aulaSelect = document.getElementById('aula-select');

        async function carregarDados() {
            try {
                // Consumindo o novo arquivo JSON
                const response = await fetch('dialogos.json');
                todosOsDialogos = await response.json();
                filtrarDialogos(); 
            } catch (erro) {
                console.error("Erro:", erro);
                txtRomaji.innerText = "Erro ao carregar o arquivo dialogos.json";
                txtRomaji.style.textAlign = "center";
            }
        }

        function filtrarDialogos() {
            const aulaSelecionada = aulaSelect.value;
            
            dialogosFiltrados = todosOsDialogos.filter(item => {
                if (item.is_deleted) return false;
                if (aulaSelecionada === "todos") return true;
                return item.aula == aulaSelecionada;
            });

            // Embaralha os diálogos para não ficar previsível
            dialogosFiltrados.sort(() => Math.random() - 0.5);
            
            indexAtual = 0;
            exibirCard();
        }

        function exibirCard() {
            if (dialogosFiltrados.length === 0) {
                txtRomaji.innerText = "Nenhum diálogo encontrado.";
                txtTraducao.innerText = "";
                return;
            }

            // Sempre garante que o card vira para a frente antes de trocar o texto
            cardElement.classList.remove('flipped');

            setTimeout(() => {
                const item = dialogosFiltrados[indexAtual];
                const romajiText = item.romaji || "";
                const tradText = item.traducao || "";

                // Ajuste de fonte baseado no tamanho do diálogo
                ajustarTamanhoFonte(txtRomaji, romajiText.length);
                ajustarTamanhoFonte(txtTraducao, tradText.length);

                txtRomaji.innerText = romajiText;
                txtTraducao.innerText = tradText;
            }, 200); // Tempo para a animação de virada (se estiver no verso)
        }

        function ajustarTamanhoFonte(elemento, tamanhoTexto) {
            elemento.classList.remove('medium', 'small');
            if (tamanhoTexto > 300) elemento.classList.add('small');
            else if (tamanhoTexto > 150) elemento.classList.add('medium');
        }

        // Eventos
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if (dialogosFiltrados.length > 0) {
                indexAtual = (indexAtual + 1) % dialogosFiltrados.length;
                exibirCard();
            }
        });

        aulaSelect.addEventListener('change', filtrarDialogos);

        carregarDados();
    </script>
</body>
</html>
