<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仮名 — Kana Trainer</title>
  <meta name="description" content="Treino simples de hiragana e katakana. Aprenda kana digitando.">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="home">
    <div class="mark" aria-hidden="true"></div>

    <h1 class="brand">仮名</h1>
    <p class="brand-sub">Kana Trainer</p>
    <p class="tagline">
      Treino direto e silencioso de hiragana e katakana.<br>
      Você vê o kana, digita o romaji, repete.
    </p>

    <div class="divider" aria-hidden="true"></div>

    <nav class="menu" aria-label="Modos de treino">
      <a href="hiragana.html">
        <span><span class="jp">ひ</span>&nbsp;&nbsp;Hiragana</span>
        <span class="arrow">→</span>
      </a>
      <a href="katakana.html">
        <span><span class="jp">カ</span>&nbsp;&nbsp;Katakana</span>
        <span class="arrow">→</span>
      </a>
      <a href="misto.html">
        <span><span class="jp">仮</span>&nbsp;&nbsp;Misto</span>
        <span class="arrow">→</span>
      </a>
    </nav>

    <div class="divider" aria-hidden="true"></div>

    <section class="pix-section">
      <p class="pix-label"><strong>Sempre gratuito. Sempre sem anúncios.</strong><br>Se o site te ajudou, um café ajuda a manter o projeto :)</p>
      <img src="assets/pix-qr.png" alt="QR Code Pix" class="pix-qr">
      <div class="pix-key-wrap">
        <span id="pix-key" class="pix-key">dee7f52a-c306-42f2-8279-3b3c446e0620</span>
        <button class="pix-copy" onclick="copyPix()">Copiar chave</button>
      </div>
      <p id="pix-copied" class="pix-copied"></p>
    </section>

    <p class="footer">日本語 · かな · 練習</p>
  </main>

  <script>
    function copyPix() {
      navigator.clipboard.writeText(document.getElementById('pix-key').textContent);
      const el = document.getElementById('pix-copied');
      el.textContent = '正解 — Copiado!';
      setTimeout(() => el.textContent = '', 2000);
    }
  </script>
</body>
</html>
